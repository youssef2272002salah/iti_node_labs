openapi: 3.0.0
info:
  title: Users and Posts API
  version: 1.0.0
  description: API for managing users and posts

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Users
    description: User management endpoints
  - name: Posts
    description: Post management endpoints

paths:
  /users:
    post:
      summary: Create a new user
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
                age:
                  type: number
                  example: 25
              required:
                - name
                - email
                - password
                - age
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
        '400':
          description: Missing required fields

    get:
      summary: Get all users with pagination
      tags:
        - Users
      parameters:
        - in: query
          name: page
          schema:
            type: number
          description: Page number (default 1)
          example: 1
        - in: query
          name: limit
          schema:
            type: number
          description: Items per page (default 10)
          example: 10
      responses:
        '200':
          description: Users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                  pagination:
                    type: object

  /users/{id}:
    get:
      summary: Get a user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: User ID
      responses:
        '200':
          description: User fetched successfully
        '400':
          description: Invalid user ID
        '404':
          description: User not found

    patch:
      summary: Update a user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                age:
                  type: number
      responses:
        '200':
          description: User updated successfully
        '400':
          description: Invalid user ID
        '404':
          description: User not found

    delete:
      summary: Delete a user by ID
      tags:
        - Users
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted successfully
        '400':
          description: Invalid user ID
        '404':
          description: User not found

  /posts:
    post:
      summary: Create a new post
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: My First Post
                content:
                  type: string
                  example: This is the content of my post
                author:
                  type: string
                  example: John Doe
                tags:
                  type: array
                  items:
                    type: string
                  example: [javascript, nodejs]
                published:
                  type: boolean
                  example: true
              required:
                - title
                - content
                - author
      responses:
        '201':
          description: Post created successfully
        '400':
          description: Missing required fields

    get:
      summary: Get all posts with pagination
      tags:
        - Posts
      parameters:
        - in: query
          name: page
          schema:
            type: number
          description: Page number (default 1)
          example: 1
        - in: query
          name: limit
          schema:
            type: number
          description: Items per page (default 10)
          example: 10
      responses:
        '200':
          description: Posts fetched successfully

  /posts/{id}:
    get:
      summary: Get a post by ID
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Post ID
      responses:
        '200':
          description: Post fetched successfully
        '400':
          description: Invalid post ID
        '404':
          description: Post not found

    patch:
      summary: Update a post by ID
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                content:
                  type: string
                author:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
                published:
                  type: boolean
      responses:
        '200':
          description: Post updated successfully
        '400':
          description: Invalid post ID
        '404':
          description: Post not found

    delete:
      summary: Delete a post by ID
      tags:
        - Posts
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted successfully
        '400':
          description: Invalid post ID
        '404':
          description: Post not found
